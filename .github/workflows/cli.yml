name: CLI

on:
  push:
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "examples/scaffold-saas/**"
      - "examples/reference-saas/**"
      - ".github/workflows/cli.yml"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "examples/scaffold-saas/**"
      - "examples/reference-saas/**"
      - ".github/workflows/cli.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:framework
      - run: npm run test:ci-init
      - run: npm run test:audit-init
      - run: npm run test:profile-agent-tool
      - run: npm run test:profile-oss-library
      - run: npm run test:eval-dry-run
      - run: npm run test:graph-build
      - run: npm run test:semantic-offline
      - run: npm run test:drift
      - run: npm run context-os -- stats "Stripe webhook failed" --root examples/scaffold-saas
